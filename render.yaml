# render.yaml — Render Blueprint for Voyage Pro
# This tells Render exactly how to deploy your backend service

services:
  - type: web
    name: voyage-pro-backend
    runtime: docker
    dockerfilePath: ./voyage-backend/Dockerfile
    dockerContext: ./voyage-backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
